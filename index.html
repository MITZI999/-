<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE BUG BOT | VIP INTERFACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <style>
        :root {
            --purple: #bc13fe;
            --dark: #000000;
            --glass: rgba(188, 19, 254, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- 3D WORLD GLOBE LOADER --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.8s ease;
        }

        .globe-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: relative;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Earth_orient_flat.jpg/640px-Earth_orient_flat.jpg');
            background-size: cover;
            box-shadow: inset 0 0 30px rgba(188, 19, 254, 0.8), 0 0 40px var(--purple);
            animation: rotateGlobe 4s linear infinite;
        }

        @keyframes rotateGlobe {
            from { background-position: 0 0; }
            to { background-position: 200px 0; }
        }

        .loader-text {
            margin-top: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--purple);
            text-shadow: 0 0 10px var(--purple);
        }

        /* --- BACKGROUND GRADIENT --- */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top right, #1a0030 0%, #000 100%);
            z-index: -1;
        }

        /* --- WORLD CLOCKS --- */
        .clocks-bar {
            background: rgba(0,0,0,0.8);
            padding: 12px;
            font-size: 0.75rem;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .clocks-bar span { color: var(--purple); font-weight: bold; }

        /* --- CONTENT WRAPPER --- */
        .container {
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- FLOATING LOGO --- */
        .logo-wrapper {
            position: relative;
            width: 125px;
            height: 125px;
            margin: 0 auto 25px;
            animation: floatUI 3s ease-in-out infinite;
        }
        .logo-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 25px;
            border: 2px solid var(--purple);
            box-shadow: 0 0 35px var(--purple);
        }
        @keyframes floatUI {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 6px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empire-id {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }

        /* --- BUTTONS --- */
        .btn-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .primary-btn {
            padding: 16px 45px;
            background: var(--purple);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 900;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--purple);
            transition: 0.3s;
            border: none;
        }
        .primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--purple);
        }

        .dev-btn {
            padding: 10px 25px;
            background: var(--glass);
            border: 1px solid var(--purple);
            color: var(--purple);
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .dev-btn:hover { background: var(--purple); color: white; }

        /* --- CHAT SECTION --- */
        .chat-card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #1a1a1a;
            padding: 15px;
            border-radius: 18px;
            max-width: 400px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }
        .chat-card:hover { border-color: var(--purple); transform: translateY(-5px); }
        .chat-card img { width: 50px; height: 50px; border-radius: 10px; border: 1px solid var(--purple); }

        /* --- MUSIC PLAYER --- */
        .player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid var(--purple);
            padding: 10px 25px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.3);
        }
        .play-pause-btn {
            background: var(--purple);
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }

        footer { opacity: 0.2; font-size: 0.6rem; letter-spacing: 4px; padding-bottom: 120px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="globe-container"></div>
        <div class="loader-text">INITIALIZING EMPIRE WORLD...</div>
    </div>

    <div class="bg-gradient"></div>

    <div class="clocks-bar">
        <div>SL: <span id="time-sl">00:00</span></div>
        <div>NY: <span id="time-ny">00:00</span></div>
        <div>LN: <span id="time-ln">00:00</span></div>
    </div>

    <div class="container">
        <div class="logo-wrapper">
            <img src="https://i.ibb.co/ZRzCw1ZF/image.jpg" alt="Empire Logo">
        </div>

        <h1>EMPIRE BUG BOT</h1>
        <p class="empire-id">𓆰 𝐄ᴍᴘɪʀᴇ • 𓆪</p>

        <div class="btn-box">
            <a href="https://t.me/empire9x" class="primary-btn">CONTACT OWNER</a>
            <a href="https://t.me/CyberMitzii" class="dev-btn">DEVELOPED BY MITZII</a>
        </div>

        <a href="https://t.me/empire_chanel_9x" class="chat-card">
            <img src="https://i.ibb.co/pvgzZrSc/image.jpg" alt="Group">
            <div style="text-align: left;">
                <p style="font-weight: bold; font-size: 0.9rem;">EMPIRE CHAT HOUSE</p>
                <p style="font-size: 0.7rem; color: var(--purple);">Join the community</p>
            </div>
            <i class="fas fa-arrow-right" style="margin-left: auto; opacity: 0.3;"></i>
        </a>

        <footer>&copy; 2026 EMPIRE TERMINAL</footer>
    </div>

    <div class="player">
        <div style="text-align: left;">
            <p style="font-size: 0.6rem; font-weight: bold; color: var(--purple);">SYSTEM PHONK</p>
        </div>
        <audio id="bg-audio" loop>
            <source src="https://files.catbox.moe/6q6f4s.mp3" type="audio/mpeg">
        </audio>
        <button class="play-pause-btn" onclick="handleMusic()" id="mBtn">
            <i class="fas fa-play"></i>
        </button>
    </div>

    <script>
        // World Clocks Update
        function updateTime() {
            const opt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            document.getElementById('time-sl').innerText = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: 'Asia/Colombo' });
            document.getElementById('time-ny').innerText = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: 'America/New_York' });
            document.getElementById('time-ln').innerText = new Date().toLocaleTimeString('en-US', { ...opt, timeZone: 'Europe/London' });
        }
        setInterval(updateTime, 1000);

        // Music Logic
        const audio = document.getElementById('bg-audio');
        const btn = document.getElementById('mBtn');
        function handleMusic() {
            if (audio.paused) { audio.play(); btn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { audio.pause(); btn.innerHTML = '<i class="fas fa-play"></i>'; }
        }

        // Hide Loader Logic
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 2500);
        };
    </script>
</body>
</html>
