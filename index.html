<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE BUG BOT VIP | ELITE INTERFACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        :root {
            --neon-purple: #bc13fe;
            --dark-bg: #030303;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- 3D NEON LOADING SCREEN --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }
        .cyber-spinner {
            width: 80px;
            height: 80px;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        .cyber-spinner::before {
            content: "";
            position: absolute;
            inset: 5px;
            border: 2px solid transparent;
            border-bottom: 2px solid #555;
            border-radius: 50%;
            animation: spin 2s linear infinite reverse;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- DYNAMIC BACKGROUND --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #120121 0%, #000 100%);
            z-index: -1;
        }

        /* --- MAIN CONTAINER --- */
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- LOGO (Small & Professional) --- */
        .logo-area {
            position: relative;
            margin-bottom: 40px;
        }
        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
            transform: rotate(-5deg);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-img:hover {
            transform: rotate(0deg) scale(1.1);
            box-shadow: 0 0 40px var(--neon-purple);
        }

        /* --- TITLES --- */
        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            text-align: center;
            background: linear-gradient(to right, #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* --- ELITE BUTTONS --- */
        .btn-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 60px;
        }
        .cyber-btn {
            padding: 14px 28px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        .cyber-btn::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .cyber-btn:hover {
            border-color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .cyber-btn:hover::after { left: 100%; }

        /* --- CARD SECTION --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            margin-bottom: 60px;
        }
        .stat-card {
            background: linear-gradient(145deg, rgba(15,15,15,1), rgba(5,5,5,1));
            padding: 40px;
            border-radius: 2px;
            border-left: 3px solid var(--neon-purple);
            transition: 0.4s;
        }
        .stat-card:hover {
            transform: scale(1.02);
            background: rgba(188, 19, 254, 0.03);
        }
        .stat-card i { color: var(--neon-purple); font-size: 1.5rem; margin-bottom: 20px; }
        .stat-card h3 { font-size: 0.8rem; letter-spacing: 3px; color: #555; margin-bottom: 5px; }
        .stat-card p { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }

        /* --- 3D FLOATING MUSIC PLAYER --- */
        .music-player {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: #000;
            padding: 15px 25px;
            border-radius: 100px;
            border: 1px solid var(--neon-purple);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
            z-index: 1000;
        }
        .play-pause-btn {
            width: 40px;
            height: 40px;
            background: var(--neon-purple);
            border: none;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }
        .play-pause-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--neon-purple); }

        footer {
            margin-top: auto;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #333;
            text-align: center;
            padding: 40px 0;
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; letter-spacing: 4px; }
            .music-player { bottom: 20px; right: 20px; left: 20px; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="text-align: center;">
            <div class="cyber-spinner"></div>
            <p style="margin-top: 20px; letter-spacing: 10px; font-size: 10px; color: var(--neon-purple);">LOADING SYSTEM...</p>
        </div>
    </div>

    <div class="bg-overlay"></div>

    <div class="wrapper">
        <div class="logo-area">
            <img src="https://i.ibb.co/ZRzCw1ZF/image.jpg" class="logo-img" alt="Empire Logo">
        </div>

        <h1>EMPIRE BUG BOT VIP</h1>
        <p class="subtitle">Next-Gen Payload Interface</p>

        <div class="btn-grid">
            <a href="https://t.me/ebugtelebot" class="cyber-btn"><i class="fab fa-telegram-plane"></i> LAUNCH BOT</a>
            <a href="https://t.me/empire_chanel_9x" class="cyber-btn"><i class="fas fa-network-wired"></i> NETWORK</a>
            <a href="https://t.me/empire9x" class="cyber-btn" style="border-color: #fff; background: rgba(255,255,255,0.05);"><i class="fas fa-shield-alt"></i> CONTACT OWNER</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-code-branch"></i>
                <h3>CORE DEVELOPER</h3>
                <p>DEV MITZII</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-crown"></i>
                <h3>SYSTEM OWNER</h3>
                <p>EMPIRE 9X</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-bolt"></i>
                <h3>STATUS</h3>
                <p style="color: #00ff00;">SYSTEM ONLINE</p>
            </div>
        </div>

        <div style="width: 100%; max-width: 600px; overflow: hidden; border-radius: 4px; border: 1px solid #111;">
             <img src="https://i.ibb.co/pvgzZrSc/image.jpg" style="width: 100%; opacity: 0.6; filter: grayscale(100%); transition: 0.5s;" onmouseover="this.style.filter='grayscale(0%)'; this.style.opacity='1'" onmouseout="this.style.filter='grayscale(100%)'; this.style.opacity='0.6'">
        </div>

        <footer>
             &copy; 2026 EMPIRE TERMINAL | ENCRYPTED BY MITZII
        </footer>
    </div>

    <div class="music-player">
        <div style="font-size: 10px; font-weight: bold; letter-spacing: 2px;">ELITE PHONK RADIO</div>
        <audio id="audioTrack" loop>
            <source src="https://files.catbox.moe/6q6f4s.mp3" type="audio/mpeg">
        </audio>
        <button class="play-pause-btn" onclick="togglePlay()" id="playIcon">
            <i class="fas fa-play"></i>
        </button>
    </div>

    <script>
        // Loader Control
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 1500);
        });

        // Music Control (Fixed Audio Play)
        const audio = document.getElementById('audioTrack');
        const btn = document.getElementById('playIcon');

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio play failed: ", e));
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audio.pause();
                btn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
    </script>
</body>
</html>
